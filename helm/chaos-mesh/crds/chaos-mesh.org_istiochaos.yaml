---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: istiochaos.chaos-mesh.org
spec:
  group: chaos-mesh.org
  names:
    kind: IstioChaos
    listKind: IstioChaosList
    plural: istiochaos
    singular: istiochaos
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.target.virtualService
      name: virtual-service
      type: string
    - jsonPath: .spec.target.httpRoute
      name: route
      type: string
    - jsonPath: .spec.duration
      name: duration
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: IstioChaos is the Schema for the istiochaos API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IstioChaosSpec defines an Istio fault injected through a
              VirtualService.
            properties:
              duration:
                description: Duration represents the duration of the chaos action.
                type: string
              fault:
                description: Fault contains the Istio fault configuration.
                properties:
                  abort:
                    description: Abort terminates a request with an HTTP status code.
                    properties:
                      httpStatus:
                        description: HTTPStatus is the status code returned to selected
                          requests.
                        format: int32
                        maximum: 599
                        minimum: 100
                        type: integer
                      percentage:
                        description: Percentage is the percentage of requests to abort.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                    required:
                    - httpStatus
                    - percentage
                    type: object
                  delay:
                    description: Delay injects latency before forwarding a request.
                    properties:
                      fixedDelay:
                        description: FixedDelay is the latency added to selected requests.
                        type: string
                      percentage:
                        description: Percentage is the percentage of requests to delay.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                    required:
                    - fixedDelay
                    - percentage
                    type: object
                type: object
              remoteCluster:
                description: RemoteCluster represents the remote cluster where the
                  chaos will be deployed.
                type: string
              target:
                description: Target identifies the VirtualService HTTP route to clone
                  and fault.
                properties:
                  httpRoute:
                    description: HTTPRoute is the name of the target entry in spec.http.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the namespace containing the VirtualService.
                    minLength: 1
                    type: string
                  virtualService:
                    description: VirtualService is the name of the target VirtualService.
                    minLength: 1
                    type: string
                required:
                - httpRoute
                - namespace
                - virtualService
                type: object
            required:
            - fault
            - target
            type: object
          status:
            description: IstioChaosStatus represents the status of an IstioChaos.
            properties:
              conditions:
                description: Conditions represents the current global condition of
                  the chaos
                items:
                  properties:
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              experiment:
                description: Experiment records the last experiment state.
                properties:
                  containerRecords:
                    description: Records are used to track the running status
                    items:
                      properties:
                        events:
                          description: Events are the essential details about the
                            injections and recoveries
                          items:
                            properties:
                              message:
                                description: Message is the detail message, e.g. the
                                  reason why we failed to inject the chaos
                                type: string
                              operation:
                                description: Operation represents the operation we
                                  are doing, when we crate this event
                                type: string
                              timestamp:
                                description: Timestamp is time when we create this
                                  event
                                format: date-time
                                type: string
                              type:
                                description: Type means the stage of this event
                                type: string
                            required:
                            - operation
                            - timestamp
                            - type
                            type: object
                          type: array
                        id:
                          type: string
                        injectedCount:
                          description: InjectedCount is a counter to record the sum
                            of successful injections
                          type: integer
                        phase:
                          type: string
                        recoveredCount:
                          description: RecoveredCount is a counter to record the sum
                            of successful recoveries
                          type: integer
                        selectorKey:
                          type: string
                      required:
                      - id
                      - injectedCount
                      - phase
                      - recoveredCount
                      - selectorKey
                      type: object
                    type: array
                  desiredPhase:
                    enum:
                    - Run
                    - Stop
                    type: string
                type: object
            required:
            - experiment
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources: {}
