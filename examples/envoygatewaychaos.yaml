apiVersion: chaos-mesh.org/v1alpha1
kind: EnvoyGatewayChaos
metadata:
  name: api-delay
  namespace: chaos-mesh
spec:
  duration: 1m
  target:
    namespace: default
    kind: HTTPRoute
    route: api
  fault:
    delay:
      fixedDelay: 500ms
      percentage: 20
